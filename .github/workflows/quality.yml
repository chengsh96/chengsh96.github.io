name: Quality (a11y + Lighthouse)

# Accessibility and performance/SEO auditing. NON-gating: these surface quality
# signals but never block a merge or deploy (audits drift with browser/tooling
# versions and external resources). Runs on PRs, weekly, and on demand; reports
# via job logs, the Lighthouse public-storage links, and uploaded artifacts.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  accessibility:
    name: Accessibility (pa11y)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Serve site
        run: npx --yes http-server -p 8080 -c-1 . &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:8080/index.html

      - name: Run pa11y-ci (WCAG2AA)
        continue-on-error: true
        run: npx --yes pa11y-ci --config .pa11yci.json

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
